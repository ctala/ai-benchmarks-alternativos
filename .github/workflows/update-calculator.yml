name: Update calculator data

# Regenera docs/data/models.json automáticamente cuando cambian los benchmark
# JSONs o el config. La calculadora en GitHub Pages siempre refleja el último
# estado del repo sin trabajo manual.
#
# Workflow:
# 1. Push a main que toque benchmarks/results/*.json o benchmarks/config.example.py
# 2. Action corre export_for_pages.py
# 3. Si models.json cambia, lo commitea de vuelta a main
# 4. GitHub Pages re-deploya automáticamente

on:
  push:
    branches: [main]
    paths:
      - 'benchmarks/results/*.json'
      - 'benchmarks/config.example.py'
      - 'benchmarks/export_for_pages.py'
      - 'benchmarks/scoring.py'
      - 'providers/adapters.py'
  workflow_dispatch:  # permite re-correr manualmente

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    # Evita loop: si el commit fue del bot, no re-correr
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias mínimas
        run: |
          pip install python-dotenv

      - name: Copiar config.example.py como config.py
        # config.py está en .gitignore (lleva keys); para regenerar models.json
        # solo necesitamos el dict MODELS, que está en config.example.py
        run: cp benchmarks/config.example.py benchmarks/config.py

      - name: Regenerar models.json
        run: python benchmarks/export_for_pages.py

      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/models.json
          if git diff --cached --quiet; then
            echo "Sin cambios en models.json"
          else
            git commit -m "chore: regenera docs/data/models.json [skip ci]"
            git push
          fi
