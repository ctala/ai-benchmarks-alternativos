name: Regenerar artefactos auto-generados

# Cuando cambian los benchmark JSONs, el config, o los scripts de generación,
# regenera todos los artefactos auto-generables del repo:
#   - docs/data/models.json (calculadora HTML)
#   - MODELOS.md (tabla con links a per-model + responses)
#   - TESTS.md (lista de 91 tests con prompts completos)
#
# La calculadora en GitHub Pages siempre refleja el último estado del repo
# sin trabajo manual.

on:
  push:
    branches: [main]
    paths:
      - 'benchmarks/results/*.json'
      - 'benchmarks/results/responses/**'
      - 'benchmarks/results/per-model/**'
      - 'benchmarks/config.example.py'
      - 'benchmarks/export_for_pages.py'
      - 'benchmarks/generate_modelos_md_table.py'
      - 'benchmarks/generate_tests_md.py'
      - 'benchmarks/scoring.py'
      - 'benchmarks/tests/**'
      - 'providers/adapters.py'
  workflow_dispatch:  # permite re-correr manualmente

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    # Evita loop: si el commit fue del bot, no re-correr
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias mínimas
        run: |
          pip install python-dotenv

      - name: Copiar config.example.py como config.py
        # config.py está en .gitignore (lleva keys); para los scripts solo
        # necesitamos el dict MODELS, que está en config.example.py
        run: cp benchmarks/config.example.py benchmarks/config.py

      - name: Regenerar docs/data/models.json
        run: python benchmarks/export_for_pages.py

      - name: Regenerar MODELOS.md (tabla con links)
        run: python benchmarks/generate_modelos_md_table.py -i

      - name: Regenerar TESTS.md (prompts completos)
        run: python benchmarks/generate_tests_md.py -o TESTS.md

      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/models.json MODELOS.md TESTS.md
          if git diff --cached --quiet; then
            echo "Sin cambios en artefactos auto-generados"
          else
            git commit -m "chore: regenera artefactos auto-generados [skip ci]"
            git push
          fi
